# Busbar deploy gate — ONE GitHub Actions workflow where one job starts a real
# Salesforce metadata deploy and the NEXT job waits — burning ZERO billable
# Actions minutes — until the org reports the deploy finished.
#
# What it demonstrates
# --------------------
#   • Job `deploy` (ungated env `salesforce-deploy`): exchanges the GitHub OIDC
#     token for a short-lived Salesforce session (RFC 8693 — no stored secret),
#     starts an ASYNC deploy of a real OSS app (Salesforce's dreamhouse-lwc,
#     ~90 components), registers a GITHUB_GATE_CHECK monitor, and EXITS. Its
#     runner is released immediately — it does NOT poll.
#   • The org then polls the deploy SERVER-SIDE and reports live status to a
#     GitHub **Check Run** on the commit (queued → in_progress → ✅/❌, with
#     component/test annotations). No GitHub runner is active during this window.
#   • When the deploy reaches a terminal state, the same monitor releases the
#     gate via the Busbar App's deployment_protection_rule callback and
#     `post-deploy` resumes.
#   • `post-deploy` needs NO Salesforce CLI and NO re-auth: the deploy result is
#     already on the commit's Check Run. It just confirms the release, proves no
#     runner was active during the deploy, and surfaces the org-pushed check.
#
# One-time prerequisites — see ./README.md. In short:
#   • One org trust rule (for the `salesforce-deploy` environment), the
#     token-exchange handler, the OIDC provider registry record, the
#     BusbarECAAccess permset, and the App granted `checks: write` +
#     `deployments: write`.
#   • GitHub env `salesforce-deploy`: vars SF_INSTANCE_URL + SF_ECA_CLIENT_ID
#     (non-secret) — and SF_NAMESPACE=none ONLY for a source-deployed dev org.
#   • GitHub env `salesforce-prod`: the Busbar App enabled as a custom deployment
#     protection rule.
#
# The workflow FILE name is load-bearing: the trust rule pins the basename
# (`busbar-deploy-gate`). Keep it at .github/workflows/busbar-deploy-gate.yml.
name: busbar-deploy-gate

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # mint a GitHub OIDC token for the exchange
  contents: read

jobs:
  deploy:
    name: Start SF deploy + arm the gate
    runs-on: ubuntu-latest
    environment: salesforce-deploy
    outputs:
      deploy_id: ${{ steps.deploy.outputs.deploy_id }}
    env:
      SF_INSTANCE_URL: ${{ vars.SF_INSTANCE_URL }}
      SF_ECA_CLIENT_ID: ${{ vars.SF_ECA_CLIENT_ID }}
      TOKEN_HANDLER: GitHubTokenExchangeHandler
      # Apex REST URLs are namespaced in a managed install (the default), e.g.
      # /services/apexrest/busbar/monitors. A source-deployed (unmanaged) dev org
      # has no prefix — set the SF_NAMESPACE variable to `none` there.
      SF_NAMESPACE: ${{ vars.SF_NAMESPACE || 'busbar' }}
    steps:
      - name: Install Salesforce CLI
        run: npm install --global @salesforce/cli >/dev/null 2>&1

      - name: Exchange GitHub OIDC for a Salesforce access token
        id: auth
        run: |
          set -euo pipefail
          aud_enc="$(jq -rn --arg a "$SF_INSTANCE_URL" '$a|@uri')"
          oidc="$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$aud_enc" | jq -r '.value')"
          resp="$(curl -sS -X POST "$SF_INSTANCE_URL/services/oauth2/token" \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode 'grant_type=urn:ietf:params:oauth:grant-type:token-exchange' \
            --data-urlencode "client_id=$SF_ECA_CLIENT_ID" \
            --data-urlencode 'subject_token_type=urn:ietf:params:oauth:token-type:jwt' \
            --data-urlencode "subject_token=$oidc" \
            --data-urlencode "token_handler=$TOKEN_HANDLER")"
          token="$(echo "$resp" | jq -r '.access_token // empty')"
          inst="$(echo "$resp" | jq -r '.instance_url // empty')"
          if [ -z "$token" ]; then echo "::error::token exchange failed: $resp"; exit 1; fi
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
          echo "instance=$inst" >> "$GITHUB_OUTPUT"

      - name: Start an async Salesforce metadata deploy (dreamhouse-lwc)
        id: deploy
        env:
          SFDX_ACCESS_TOKEN: ${{ steps.auth.outputs.token }}
          INSTANCE: ${{ steps.auth.outputs.instance }}
        run: |
          set -euo pipefail
          sf org login access-token --instance-url "$INSTANCE" --alias sf-runtime --no-prompt
          # Deploy a real, substantial OSS app — Salesforce's dreamhouse-lwc sample
          # (~90 components: custom objects, Apex, ~20 LWCs, layouts, an app) — so
          # the deploy takes genuine server-side time. NoTestRun keeps completion
          # clean + predictable (we are demonstrating the gate, not the app's tests).
          git clone --depth 1 https://github.com/trailheadapps/dreamhouse-lwc.git app
          cd app
          id="$(sf project deploy start --source-dir force-app --target-org sf-runtime \
            --test-level NoTestRun --ignore-conflicts --async --json | jq -r '.result.id')"
          if [ -z "$id" ] || [ "$id" = "null" ]; then echo "::error::no deploy id returned"; exit 1; fi
          echo "deploy_id=$id" >> "$GITHUB_OUTPUT"
          echo "Started async dreamhouse-lwc deploy $id"

      - name: Arm the gate + status check (register a GITHUB_GATE_CHECK monitor)
        env:
          TOKEN: ${{ steps.auth.outputs.token }}
          INSTANCE: ${{ steps.auth.outputs.instance }}
          DEPLOY_ID: ${{ steps.deploy.outputs.deploy_id }}
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          case "$SF_NAMESPACE" in none | "") pfx="" ;; *) pfx="$SF_NAMESPACE/" ;; esac
          # run_id drives the gate; owner/repo/headSha/name drive the Check Run on
          # the commit. One monitor, one server-side poll, both effects.
          body="$(jq -n --arg eid "$DEPLOY_ID" --arg rid "$GITHUB_RUN_ID" \
            --arg owner "$owner" --arg repo "$repo" --arg sha "$GITHUB_SHA" \
            '{jobType:"METADATA_DEPLOY", externalId:$eid, sink:"GITHUB_GATE_CHECK",
              sinkRef:{run_id:$rid, owner:$owner, repo:$repo, headSha:$sha, name:"Salesforce Deploy"}}')"
          code="$(curl -sS -o resp.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer $TOKEN" -H 'Content-Type: application/json' \
            -d "$body" "$INSTANCE/services/apexrest/${pfx}monitors")"
          echo "monitor kickoff HTTP $code: $(cat resp.json)"
          [ "$code" = "200" ]

  post-deploy:
    name: Gated on the org (Waiting → released; status from the org-pushed check)
    needs: deploy
    runs-on: ubuntu-latest
    environment: salesforce-prod
    # No org auth here, so no id-token. actions:read for this run's jobs/timing,
    # checks:read for the Check Run the org pushed to the commit.
    permissions:
      contents: read
      actions: read
      checks: read
    steps:
      - name: Confirm release
        run: echo "✅ Released by the org after the Salesforce deploy reached a terminal state — no SF CLI, no re-auth: the org already pushed the result to the commit's Check Run."

      - name: Prove zero runner minutes during the deploy gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # The deploy job is completed; this (post-deploy) job is in_progress.
          # The window [deploy.completed_at, this.started_at] is the deploy + gate
          # time during which NO runner was assigned to this job. (On a public repo
          # billable is always 0 — the jobs-API gap is the repo-type-independent proof.)
          jobs="$(gh api "/repos/$OWNER_REPO/actions/runs/$RUN_ID/jobs")"
          timing="$(gh api "/repos/$OWNER_REPO/actions/runs/$RUN_ID/timing" 2>/dev/null || echo '{}')"
          jq -rn --argjson j "$jobs" --argjson t "$timing" '
            ($j.jobs) as $all
            | ([ $all[] | select(.completed_at != null) ] | sort_by(.completed_at) | last) as $deploy
            | ([ $all[] | select(.status != "completed") ] | sort_by(.started_at) | last) as $this
            | ($deploy.completed_at | fromdateiso8601) as $dc
            | ($this.started_at | fromdateiso8601) as $ts
            | ($this.created_at | fromdateiso8601) as $tcr
            | ([ $all[] | select(.started_at != null)
                 | (if .completed_at then (.completed_at | fromdateiso8601) else now end) - (.started_at | fromdateiso8601) ]
               | add | floor) as $active
            | ($ts - $dc | floor) as $gate
            | ($ts - $tcr | floor) as $wait
            | (($t.run_duration_ms // 0) / 1000 | floor) as $wall
            | (([ $t.billable[]?.total_ms ] | add) // 0) as $bill
            | "## 🔌 Busbar deploy gate — runner accounting\n\n| metric | value |\n|---|---|\n| Wall-clock run duration | \($wall) s |\n| Runner-active seconds (Σ started→completed across jobs) | \($active) s |\n| **Deploy-gate window with NO runner active** (deploy done → next job started) | **\($gate) s** |\n| Next job queued + gated (created→started) | \($wait) s |\n| Billable runner ms (timing API; 0 on public repos) | \($bill) ms |\n\n> **The gate held `\($this.name)` for ~\($gate)s while the org ran the deploy server-side — ZERO GitHub runner minutes burned during that window.**\n> The job existed from \($deploy.completed_at) (when the deploy job ended) but no runner was assigned until \($this.started_at) — the org, not a runner, did the waiting."
          ' | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Surface the org-pushed deploy Check Run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER_REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # The deploy result was streamed to a Check Run on this commit by the org
          # (server-side, no runner). Read it back with the GITHUB_TOKEN — no SF CLI.
          cr="$(gh api "/repos/$OWNER_REPO/commits/$SHA/check-runs" 2>/dev/null || echo '{}')"
          jq -rn --argjson c "$cr" '
            ([ ($c.check_runs // [])[] | select(.name == "Salesforce Deploy") ] | sort_by(.started_at) | last) as $r
            | if $r == null then
                "## 🔎 Salesforce Deploy check\n\n(no `Salesforce Deploy` check run found on this commit — the org may lack checks:write.)"
              else
                (if $r.conclusion == "success" then "✅" elif $r.conclusion == "failure" then "❌" else "🔸" end) as $e
                | "## \($e) Salesforce Deploy check — `\($r.status)`\($r.conclusion | if . then " / `\(.)`" else "" end)\n\n\($r.output.summary // "(no summary)")\n\n[View check run on the commit](\($r.html_url))"
              end
          ' | tee -a "$GITHUB_STEP_SUMMARY"
